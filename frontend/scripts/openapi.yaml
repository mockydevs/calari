components:
  schemas:
    ChangePasswordRequest:
      type: object
      properties:
        current_password:
          type: string
          writeOnly: true
          minLength: 1
        new_password:
          type: string
          writeOnly: true
          minLength: 8
        confirm_password:
          type: string
          writeOnly: true
          minLength: 1
      required:
      - confirm_password
      - current_password
      - new_password
    Clients:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
        email:
          type: string
          format: email
          maxLength: 254
        phone_number:
          type: string
          maxLength: 20
        company_name:
          type: string
          maxLength: 255
        created_at:
          type: string
          format: date-time
          readOnly: true
        is_active:
          type: boolean
      required:
      - created_at
      - email
      - id
      - name
    ClientsRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        email:
          type: string
          format: email
          minLength: 1
          maxLength: 254
        phone_number:
          type: string
          maxLength: 20
        company_name:
          type: string
          maxLength: 255
        is_active:
          type: boolean
      required:
      - email
      - name
    EffectiveRoleEnum:
      enum:
      - superuser
      - admin
      - viewer
      type: string
      description: |-
        * `superuser` - superuser
        * `admin` - admin
        * `viewer` - viewer
    ForgotPasswordRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          minLength: 1
      required:
      - email
    LoginRequest:
      type: object
      properties:
        username_or_email:
          type: string
          minLength: 1
        password:
          type: string
          writeOnly: true
          minLength: 1
      required:
      - password
      - username_or_email
    PatchedClientsRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        email:
          type: string
          format: email
          minLength: 1
          maxLength: 254
        phone_number:
          type: string
          maxLength: 20
        company_name:
          type: string
          maxLength: 255
        is_active:
          type: boolean
    PatchedProjectBlockersRequest:
      type: object
      properties:
