openapi: 3.0.3
info:
  title: Calari Staff Portal API
  version: v1
  description: REST API documentation for the Calari Staff Portal
  contact:
    email: support@calari.com
  license:
    name: Proprietary
paths:
  /api/token/:
    post:
      operationId: token_create
      description: Authenticate with username/email and password. JWT tokens are set
        as httpOnly cookies on success.
      summary: Login
      tags:
      - Auth — Token
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      security:
      - cookieAuth: []
      - {}
      responses:
        '200':
          description: Login successful — tokens set in cookies
        '401':
          description: Invalid credentials
  /api/token/refresh/:
    post:
      operationId: token_refresh_create
      description: Issues a new access token using the refresh_token cookie. No request
        body needed.
      summary: Refresh access token
      tags:
      - Auth — Token
      security:
      - cookieAuth: []
      - {}
      responses:
        '200':
          description: Access token refreshed
        '401':
          description: Missing or invalid refresh token
  /api/token/logout/:
    post:
      operationId: token_logout_create
      description: Blacklists the refresh token and clears both JWT cookies.
      summary: Logout
      tags:
      - Auth — Token
      security:
      - cookieAuth: []
      - {}
      responses:
        '200':
          description: Logged out successfully
  /api/auth/me/:
    get:
      operationId: auth_me_retrieve
      description: Returns the authenticated user's profile. Requires a valid access_token
        cookie.
      summary: Get current user
      tags:
      - Auth — Profile
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
  /api/auth/change-password/:
    post:
      operationId: auth_change_password_create
      description: Allows the authenticated user to change their own password. Re-issues
        JWT cookies on success.
      summary: Change own password
      tags:
      - Auth — Profile
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
        required: true
      security:
      - cookieAuth: []
      responses:
        '200':
          description: Password changed — new tokens set in cookies
        '400':
          description: Current password is incorrect
  /api/auth/reset-password/:
    post:
      operationId: auth_reset_password_create
      description: Manager (admin/superuser) resets another user's password. Admins
        cannot reset superuser passwords.
      summary: Admin reset password
      tags:
      - Auth — User Management
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
        required: true
      security:
      - cookieAuth: []
      responses:
        '200':
          description: Password reset successfully
        '403':
          description: Permission denied
  /api/auth/register/:
    post:
      operationId: auth_register_create
      description: Manager (admin/superuser) creates a new portal user. Admins cannot
        create superuser accounts.
      summary: Create user
      tags:
      - Auth — User Management
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
        required: true
      security:
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
        '403':
          description: Permission denied
  /api/auth/users/:
    get:
      operationId: auth_users_list
      description: Returns all portal users ordered by most recent join date. Requires
        admin or superuser role.
      summary: List all users
      tags:
      - Auth — User Management
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
          description: ''
  /api/auth/users/{user_id}/:
    patch:
      operationId: auth_users_partial_update
      description: Manager partially updates a user's profile fields. Role escalation
        to superuser requires superuser caller.
      summary: Update user
      parameters:
      - in: path
        name: user_id
        schema:
          type: integer
        required: true
      tags:
      - Auth — User Management
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUpdateUserRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUpdateUserRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUpdateUserRequest'
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
        '403':
          description: Permission denied
        '404':
          description: User not found
  /api/auth/users/{user_id}/deactivate/:
    post:
      operationId: auth_users_deactivate_create
      description: Prevents the user from logging in. Cannot deactivate yourself or
        the last superuser.
      summary: Deactivate user
      parameters:
      - in: path
        name: user_id
        schema:
          type: integer
        required: true
      tags:
      - Auth — User Management
      security:
      - cookieAuth: []
      responses:
        '200':
          description: User deactivated
        '400':
          description: Cannot deactivate own account or last superuser
        '403':
          description: Permission denied
        '404':
          description: User not found
  /api/auth/users/{user_id}/activate/:
    post:
      operationId: auth_users_activate_create
      description: Re-enables a previously deactivated user account.
      summary: Activate user
      parameters:
      - in: path
        name: user_id
        schema:
          type: integer
        required: true
      tags:
      - Auth — User Management
      security:
      - cookieAuth: []
      responses:
        '200':
          description: User activated
        '403':
          description: Permission denied
        '404':
          description: User not found
  /api/auth/users/{user_id}/delete/:
    delete:
      operationId: auth_users_delete_destroy
      description: Soft-deletes a user by deactivating their account. Cannot remove
        yourself or the last superuser.
      summary: Remove user
      parameters:
      - in: path
        name: user_id
        schema:
          type: integer
        required: true
      tags:
      - Auth — User Management
      security:
      - cookieAuth: []
      responses:
        '200':
          description: User removed (deactivated)
        '400':
          description: Cannot delete own account or last superuser
        '403':
          description: Permission denied
        '404':
          description: User not found
  /api/auth/forgot-password/:
    post:
      operationId: auth_forgot_password_create
      description: Sends a one-time password reset link to the given email if an active
        account exists. Always returns 200 to avoid email enumeration.
      summary: Request password reset
      tags:
      - Auth — Password Reset
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
        required: true
      security:
      - cookieAuth: []
      - {}
      responses:
        '200':
          description: Reset link sent (if email exists)
  /api/auth/reset-password-confirm/:
    post:
      operationId: auth_reset_password_confirm_create
      description: Validates the UUID reset token and sets the new password. Single-use,
        expires after 1 hour.
      summary: Confirm password reset
      tags:
      - Auth — Password Reset
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordConfirmRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ResetPasswordConfirmRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ResetPasswordConfirmRequest'
        required: true
      security:
      - cookieAuth: []
      - {}
      responses:
        '200':
          description: Password reset successfully
        '400':
          description: Invalid, expired or already-used token
  /api/projects/dashboard-stats/:
    get:
      operationId: projects_dashboard_stats_retrieve
      summary: Dashboard stats
      tags:
      - Projects
      security:
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/projects/my-dashboard/:
    get:
      operationId: projects_my_dashboard_retrieve
      description: Returns stat counts, almost-due tasks, high-priority tasks, overdue
        tasks, upcoming milestones, active project blockers, and recent project activity
        — all scoped to the current user.
      summary: Personalized dashboard data for the current user
      tags:
      - Projects
      security:
      - cookieAuth: []
      responses:
        '200':
          description: Dashboard payload
  /api/projects/my-projects/:
    get:
      operationId: projects_my_projects_list
      description: Returns projects visible to the current user. Admins and superusers
        see all projects. Other users see only projects where they are the primary
        assignee or a co-assignee.
      summary: My projects
      parameters:
      - in: query
        name: priority
        schema:
          type: string
        description: Filter by priority
      - in: query
        name: search
        schema:
          type: string
        description: Search in name/description
      - in: query
        name: status
        schema:
          type: string
        description: Filter by status
      tags:
      - Projects
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProjectList'
          description: ''
  /api/projects/projects/{id}/progress/:
    get:
      operationId: projects_projects_progress_retrieve
      summary: Project task progress
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Projects
      security:
      - cookieAuth: []
      responses:
        '200':
          description: '{"total": int, "done": int, "percent": int}'
  /api/projects/clients/:
    post:
      operationId: projects_clients_create
      summary: Create a client
      tags:
      - Clients
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClientsRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ClientsRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ClientsRequest'
        required: true
      security:
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Clients'
          description: ''
    get:
      operationId: projects_clients_list
      summary: List all clients
      parameters:
      - in: query
        name: is_active
        schema:
          type: boolean
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - Clients
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Clients'
          description: ''
  /api/projects/clients/{id}/:
    put:
      operationId: projects_clients_update
      summary: Update a client
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this clients.
        required: true
      tags:
      - Clients
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClientsRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ClientsRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ClientsRequest'
        required: true
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Clients'
          description: ''
    get:
      operationId: projects_clients_retrieve
      summary: Retrieve a client
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this clients.
        required: true
      tags:
      - Clients
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Clients'
          description: ''
    delete:
      operationId: projects_clients_destroy
      summary: Delete a client
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this clients.
        required: true
      tags:
      - Clients
      security:
      - cookieAuth: []
      responses:
        '204':
          description: No response body
    patch:
      operationId: projects_clients_partial_update
      summary: Partially update a client
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this clients.
        required: true
      tags:
      - Clients
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedClientsRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedClientsRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedClientsRequest'
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Clients'
          description: ''
  /api/projects/projects/:
    post:
      operationId: projects_projects_create
      summary: Create a project
      tags:
      - Projects
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectsRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ProjectsRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ProjectsRequest'
        required: true
      security:
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Projects'
          description: ''
    get:
      operationId: projects_projects_list
      summary: List all projects
      parameters:
      - in: query
        name: assigned_to
        schema:
          type: integer
      - in: query
        name: client
        schema:
          type: integer
      - in: query
        name: end_date
        schema:
          type: string
          format: date
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - in: query
        name: priority
        schema:
          type: string
          enum:
          - critical
          - high
          - low
          - medium
        description: |-
          * `low` - Low
          * `medium` - Medium
          * `high` - High
          * `critical` - Critical
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: start_date
        schema:
          type: string
          format: date
      - in: query
        name: status
        schema:
          type: string
          enum:
          - active
          - cancelled
          - completed
          - on_hold
        description: |-
          * `active` - Active
          * `on_hold` - On Hold
          * `completed` - Completed
          * `cancelled` - Cancelled
      tags:
      - Projects
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Projects'
          description: ''
  /api/projects/projects/{id}/:
    delete:
      operationId: projects_projects_destroy
      summary: Delete a project
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this projects.
        required: true
      tags:
      - Projects
      security:
      - cookieAuth: []
      responses:
        '204':
          description: No response body
    put:
      operationId: projects_projects_update
      summary: Update a project
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this projects.
        required: true
      tags:
      - Projects
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectsRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ProjectsRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ProjectsRequest'
        required: true
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Projects'
          description: ''
    get:
      operationId: projects_projects_retrieve
      summary: Retrieve a project
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this projects.
        required: true
      tags:
      - Projects
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Projects'
          description: ''
    patch:
      operationId: projects_projects_partial_update
      summary: Partially update a project
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this projects.
        required: true
      tags:
      - Projects
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedProjectsRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedProjectsRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedProjectsRequest'
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Projects'
          description: ''
  /api/projects/project-files/:
    post:
      operationId: projects_project_files_create
      summary: Upload a project file
      tags:
      - Project Files
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectFilesRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ProjectFilesRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ProjectFilesRequest'
        required: true
      security:
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectFiles'
          description: ''
    get:
      operationId: projects_project_files_list
      summary: List project files
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - in: query
        name: project
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: uploaded_by
        schema:
          type: integer
      tags:
      - Project Files
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProjectFiles'
          description: ''
  /api/projects/project-files/{id}/:
    put:
      operationId: projects_project_files_update
      summary: Update a project file
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this project files.
        required: true
      tags:
      - Project Files
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectFilesRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ProjectFilesRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ProjectFilesRequest'
        required: true
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectFiles'
          description: ''
    get:
      operationId: projects_project_files_retrieve
      summary: Retrieve a project file
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this project files.
        required: true
      tags:
      - Project Files
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectFiles'
          description: ''
    delete:
      operationId: projects_project_files_destroy
      summary: Delete a project file
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this project files.
        required: true
      tags:
      - Project Files
      security:
      - cookieAuth: []
      responses:
        '204':
          description: No response body
    patch:
      operationId: projects_project_files_partial_update
      summary: Partially update a project file
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this project files.
        required: true
      tags:
      - Project Files
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedProjectFilesRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedProjectFilesRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedProjectFilesRequest'
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectFiles'
          description: ''
  /api/projects/project-contacts/:
    post:
      operationId: projects_project_contacts_create
      summary: Create a project contact person
      tags:
      - Project Contacts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectContactPersonRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ProjectContactPersonRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ProjectContactPersonRequest'
        required: true
      security:
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectContactPerson'
          description: ''
    get:
      operationId: projects_project_contacts_list
      summary: List project contact persons
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - in: query
        name: project
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - Project Contacts
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProjectContactPerson'
          description: ''
  /api/projects/project-contacts/{id}/:
    put:
      operationId: projects_project_contacts_update
      summary: Update a project contact person
      parameters:
      - in: path
        name: id
