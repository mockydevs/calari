# Calari monorepo — local dev stack.
#   backend  : Django REST API (Daphne/ASGI + Celery) on :8000
#   frontend : Next.js app (Builds + Staff Portal) on :3000
# PostgreSQL + Redis are external (managed); set via DATABASE_URL / REDIS_URL.
name: calari

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: calari_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env.dev
    environment:
      CLOUD_ENV: "True" # use env vars (below + env_file) instead of re-loading .env.dev
      DEBUG: "True"
      SECRET_KEY: "dev-only-change-me"
      FRONTEND_URL: "http://localhost:3000"
      AUTH_COOKIE_SECURE: "False"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: calari_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env
    environment:
      # The BFF runs server-side inside this container; reach the backend by service name.
      DJANGO_API_URL: "http://backend:8000"
    depends_on:
      - backend
