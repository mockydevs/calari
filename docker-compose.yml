# Calari — the single Docker stack for both local dev and production deploy.
#
#   backend  : Django REST API (Daphne/ASGI + Celery worker & beat) on :8000
#   frontend : Next.js app (Builds + Staff Portal) on :3000
#
# PostgreSQL + Redis are EXTERNAL/managed — there are no db/redis services here.
# Configure connection + secrets via environment:
#   - Local : drop values into a single repo-root ./.env (see .env.example)
#   - Coolify/prod : set every variable in the service dashboard. The env_file
#                    entries below are optional (required: false), so a missing
#                    file is fine when the platform injects the env directly.
#
# Ports are EXPOSEd (internal to the Docker network), NOT published to the host —
# Coolify's proxy routes the domain to the frontend, and the frontend's BFF
# reaches the backend by service name (http://backend:8000). Publishing host
# ports collides with other apps on a shared server ("port is already allocated").
# For local work, run the dev servers directly (npm run dev / daphne) per the README.
name: calari

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: calari_backend
    restart: unless-stopped
    expose:
      - "8000"
    env_file:
      # Single repo-root env file shared by both services (local/dev only;
      # Coolify injects vars directly in production).
      - path: ./.env
        required: false
    environment:
      CLOUD_ENV: "True" # read config from the environment, not a re-loaded .env
      DEBUG: ${DEBUG:-False}
      SECRET_KEY: ${SECRET_KEY:-dev-only-change-me}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-False}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: calari_frontend
    restart: unless-stopped
    expose:
      - "3000"
    env_file:
      - path: ./.env
        required: false
    environment:
      NODE_ENV: production
      # The BFF runs server-side in this container; reach the backend by service
      # name locally, or set DJANGO_API_URL to the public API URL in production.
      DJANGO_API_URL: ${DJANGO_API_URL:-http://backend:8000}
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
