  redis:
    image: redis:7-alpine
    container_name: calari_redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --requirepass "rX9mK2pQwZ7vNsT4" --user calari_redis on ">rX9mK2pQwZ7vNsT4" "~*" "+@all"
    volumes:
      - redis-data:/data
    networks:
      - my_network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: calari_phpmyadmin
    restart: always
    ports:
      - "8892:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: calari_user
      PMA_PASSWORD: calari_password
    depends_on:
      - db

networks:
  my_network:
    driver: bridge

volumes:
  db-data:
  redis-data:
  minio-data:
  