  db:
    image: mysql:latest
    container_name: calari_mysql_db
    restart: always
    ports:
      - 3305:3306
    volumes:
      - db-data:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=0000
      - MYSQL_DATABASE=calari_db
      - MYSQL_USER=calari_user
      - MYSQL_PASSWORD=calari_password

  

